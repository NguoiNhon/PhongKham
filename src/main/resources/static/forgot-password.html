<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quên mật khẩu — TYT Quận Thanh Xuân</title>
<link rel="stylesheet" href="css/styles.css"/>
<link rel="stylesheet" href="css/forgot-password.css"/>
</head>
<body>

<script src="js/app.js"></script>
<script>renderHeader && renderHeader();</script>

<!-- HERO -->
<section class="fp-hero">
  <div class="fp-hero-grid"></div>
  <div class="container fp-hero-inner">
    <span class="fp-eyebrow">🔐 Khôi phục tài khoản</span>
    <h1 class="fp-title">Quên mật khẩu<br/><span>TYT Quận Thanh Xuân</span></h1>
    <p class="fp-lead">
      Nhập email đã đăng ký để nhận mã OTP và đặt lại mật khẩu mới
      cho tài khoản của bạn.
    </p>
    <div class="fp-meta">
      <span class="fp-chip">📧 Gửi OTP qua email</span>
      <span class="fp-chip">🔑 Đặt mật khẩu mới</span>
      <span class="fp-chip">🛡️ An toàn & bảo mật</span>
    </div>
    <div class="fp-dots">
      <span class="dot active"></span><span class="dot"></span>
    </div>
  </div>
</section>

<!-- CONTENT -->
<section class="fp-section">
  <div class="container fp-container">
    <div class="fp-card">
      <h2 class="fp-h2">Khôi phục mật khẩu</h2>
      <p class="fp-sub">Làm theo 2 bước để lấy lại quyền truy cập.</p>

      <div class="fp-form">
        <!-- STEP 1 -->
        <div id="emailSection">
          <label>
            Email
            <input type="email" id="email" placeholder="Nhập email"/>
          </label>
          <button class="fp-btn" style="margin-top:14px" onclick="sendOtp()">Gửi OTP</button>
        </div>

        <!-- STEP 2 -->
        <div id="resetSection" style="display:none">
          <label>
            Mã OTP
            <input type="text" id="otp" placeholder="Nhập OTP"/>
          </label>
          <label style="margin-top:12px">
            Mật khẩu mới
            <input type="password" id="newPassword" placeholder="Mật khẩu mới"/>
          </label>
          <button class="fp-btn" style="margin-top:14px" onclick="handleResetPassword()">Đổi mật khẩu</button>
        </div>

        <div class="fp-back">
          <a href="auth.html" class="fp-link">← Quay lại đăng nhập</a>
        </div>
      </div>
    </div>
  </div>
</section>

<script>renderFooter && renderFooter();</script>
<script src="js/auth.js"></script>
</body>
</html>
