<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dành cho bệnh nhân — TYT Quận Thanh Xuân</title>
<link rel="stylesheet" href="css/styles.css"/>
<link rel="stylesheet" href="css/patients.css"/>
</head>
<body>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>

<script>renderHeader("patients.html");</script>

<!-- HERO -->
<section class="pt-hero">
  <div class="pt-hero-grid"></div>
  <div class="container pt-hero-inner">
    <span class="pt-eyebrow">🧑‍⚕️ Khu vực bệnh nhân</span>
    <h1 class="pt-title">Dành cho bệnh nhân<br/><span>TYT Quận Thanh Xuân</span></h1>
    <p class="pt-lead">
      Theo dõi lịch khám, xem hoá đơn và quản lý thông tin sức khỏe
      cá nhân của bạn một cách thuận tiện.
    </p>
    <div class="pt-meta">
      <span class="pt-chip">📅 Lịch khám của tôi</span>
      <span class="pt-chip">🧾 Hoá đơn</span>
      <span class="pt-chip">🩺 Hồ sơ y tế</span>
    </div>
    <div class="pt-dots">
      <span class="dot active"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span>
    </div>
  </div>
</section>

<!-- CONTENT -->
<section class="pt-section">
  <div class="container pt-container">
    <div class="pt-card">
      <div class="pt-card-head">
        <h2 class="pt-h2">Quản lý lịch khám</h2>
        <p class="pt-sub">Quản lý lịch khám và hoá đơn của bạn.</p>
      </div>

      <div class="pt-tabs tabs">
        <button id="tab1" class="active" onclick="setTab('appts')">Lịch khám của tôi</button>
      </div>

      <div id="content" class="pt-content"></div>
      <div id="invoiceBox" class="pt-invoice mt-4"></div>
    </div>
  </div>
</section>

<script>renderFooter();</script>

<script src="js/patient.api.js"></script>
<script src="js/patient.js"></script>
</body>
</html>
